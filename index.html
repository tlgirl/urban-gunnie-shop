<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Gunnie Shop</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;                    
}

h1{
    text-align:center;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

input,select{
    padding:10px;
    border:none;
    border-radius:8px;
}

#producten{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#1e1e1e;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.4);
}

.foto{
    font-size:60px;
    text-align:center;
    margin-bottom:15px;
}

.product{
    font-size:22px;
    font-weight:bold;
}

.info{
    margin:6px 0;
}

.prijs{
    color:#2ecc71;
    font-weight:bold;
    font-size:20px;
}

input.user{
    width:100%;
    box-sizing:border-box;
    margin-top:8px;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

</style>
</head>

<body>

<h1>🔫 Urban Gun Shop 🔫</h1>

<div class="controls">

<input
id="zoek"
placeholder="Zoek product..."
oninput="render()"
>

<select id="categorie" onchange="render()">
<option value="">Alle categorieën</option>
<option value="Gun">Gun</option>
<option value="Melee">Melee</option>
</select>

<select id="sort" onchange="render()">
<option value="prijs_desc">Prijs hoog → laag</option>
<option value="prijs_asc">Prijs laag → hoog</option>
<option value="naam_asc">Naam A → Z</option>
<option value="naam_desc">Naam Z → A</option>
<option value="dura_desc">Dura hoog → laag</option>
<option value="dura_asc">Dura laag → hoog</option>
</select>

</div>

<div id="producten"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby4OM6nMs1NEbsPcAnWkx_IAKvkv_n6YaZYIp4DqBVUmhtMmR-t6KBq4siJX0IgqLIS/exec";

let producten = [];

fetch(API_URL)
.then(r=>r.json())
.then(data=>{
    producten=data;
    render();
});

function euro(v){

return "€" +
Number(v)
.toLocaleString("nl-NL");

}

function render(){

let zoek =
document.getElementById("zoek")
.value
.toLowerCase();

let categorie =
document.getElementById("categorie")
.value;

let sort =
document.getElementById("sort")
.value;

let lijst =
producten.filter(p=>{

let okZoek =
p.product.toLowerCase().includes(zoek);

let okCat =
!categorie ||
p.categorie === categorie;

return okZoek && okCat;

});

if(sort==="prijs_desc"){
lijst.sort((a,b)=>b.prijs-a.prijs);
}

if(sort==="prijs_asc"){
lijst.sort((a,b)=>a.prijs-b.prijs);
}

if(sort==="naam_asc"){
lijst.sort((a,b)=>a.product.localeCompare(b.product));
}

if(sort==="naam_desc"){
lijst.sort((a,b)=>b.product.localeCompare(a.product));
}

if(sort==="dura_desc"){
lijst.sort((a,b)=>b.dura-a.dura);
}

if(sort==="dura_asc"){
lijst.sort((a,b)=>a.dura-b.dura);
}

let html="";

lijst.forEach(p=>{

let afbeelding="";

if(p.afbeelding){

afbeelding=
`<img src="${p.afbeelding}"
style="width:100%;border-radius:10px;">`;

}else{

afbeelding=
p.categorie==="Melee"
?'<div class="foto">🔪</div>'
:'<div class="foto">🔫</div>';

}

html += `

<div class="card">

${afbeelding}

<div class="product">
${p.product}
</div>

<div class="info">
⚙️ Dura: ${p.dura}
</div>

<div class="info">
📦 Voorraad: ${p.aantal}
</div>

<div class="prijs">
${euro(p.prijs)}
</div>

<input
class="user"
id="naam_${p.id}"
placeholder="Ingame naam"
>

<input
class="user"
id="discord_${p.id}"
placeholder="Discord naam"
>

<button onclick="reserveer(${p.id})">
Reserveer
</button>

</div>

`;

});

document.getElementById("producten")
.innerHTML = html;

}

function reserveer(id){

const knop = event.target;

if(knop.disabled){
return;
}

let naam =
document.getElementById("naam_"+id).value.trim();

let discord =
document.getElementById("discord_"+id).value.trim();

if(naam.length < 2){

alert(
"Je ingame naam moet minimaal 2 tekens bevatten."
);

return;

}

if(discord.length < 3){

alert(
"Je Discord naam moet minimaal 3 tekens bevatten."
);

return;

}

knop.disabled = true;
knop.innerText = "Bezig...";

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

id:id,
naam:naam,
discord:discord

})

})

.then(r=>r.text())

.then(t=>{

if(t==="OK"){

alert(
"Reservering geplaatst!"
);

location.reload();
return;

}

if(t==="UITVERKOCHT"){

alert(
"Dit item is uitverkocht."
);

}

else if(t==="MAX_RESERVERINGEN"){

alert(
"Je hebt al 5 open reserveringen."
);

}
    
else if(t==="SERVER_DRUK"){

alert(
"Server is even bezig, probeer het over 1 seconde opnieuw."
);

return;

}

else if(t==="NAAM_ONGELDIG"){

alert(
"Naam ongeldig."
);

}

else if(t==="DISCORD_ONGELDIG"){

alert(
"Discord ongeldig."
);

}

else{

alert(
"Fout: " + t
);

}

knop.disabled = false;
knop.innerText = "Reserveer";

})

.catch(err=>{

console.error(err);

alert(
"FOUT:\n\n" + err
);

knop.disabled = false;
knop.innerText = "Reserveer";

});

}

</script>

</body>
</html>
