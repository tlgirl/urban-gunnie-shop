<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Urban Gunnie Shop</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.card{
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:15px;
    padding:20px;
    margin:20px auto;
    max-width:500px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.price{
    color:#2ecc71;
    font-size:20px;
    font-weight:bold;
}

.dura{
    color:#f1c40f;
}
</style>

</head>

<body>

<h1>🔫 Urban Gunnie Shop</h1>

<div class="card">

<h2>Karambit Dark Purple</h2>

<p><b>Dura:</b> 50</p>
<p><b>Prijs:</b> €112.500</p>

<input id="naam" placeholder="Ingame naam">

<input id="discord" placeholder="Discord naam">

<button onclick="reserveer()">
Reserveer
</button>

</div>

<script>

function reserveer(){

const naam = document.getElementById("naam").value;
const discord = document.getElementById("discord").value;

if(!naam || !discord){
alert("Vul je naam en Discord in.");
return;
}

fetch("https://script.google.com/macros/s/AKfycby4OM6nMs1NEbsPcAnWkx_IAKvkv_n6YaZYIp4DqBVUmhtMmR-t6KBq4siJX0IgqLIS/exec",{
method:"POST",
body:JSON.stringify({
id:1,
naam:naam,
discord:discord
})
})
.then(r=>r.text())
.then(data=>{
alert("Reservering verzonden!");
})
.catch(err=>{
alert("Er ging iets fout.");
});
}

</script>

</body>
</html>
